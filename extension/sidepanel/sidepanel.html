<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="titleApp">NOTEtoolsLM</title>
<link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <span class="logo">&#9889;</span>
      <span data-i18n="titleApp">NOTEtoolsLM</span>
    </div>
    <div class="header-actions">
      <button class="btn ghost sm" id="btn-sdk-auth" title="Connect NotebookLM SDK">&#x1F511;</button>
      <button class="btn ghost sm" id="btn-scan" title="Scan for artifacts" data-i18n-title="scanForArtifacts">&#x21bb;</button>
      <button class="btn ghost sm" id="btn-settings" title="Settings" data-i18n-title="settings">&#x2699;</button>
    </div>
  </div>

  <div class="sdk-status-bar" id="sdk-status-bar">
    <span class="sdk-dot" id="sdk-dot"></span>
    <span id="sdk-status-text">Checking SDK...</span>
  </div>

  <!-- Workspace Selector -->
  <div class="workspace-bar">
    <select class="workspace-select" id="workspace-select">
      <option value="" data-i18n="personalWorkspace">Personal</option>
    </select>
  </div>

  <!-- Panel Tabs -->
  <div class="panel-tabs">
    <button class="panel-tab active" data-panel="artifacts">Artifacts</button>
    <button class="panel-tab" data-panel="sources">Sources</button>
  </div>

  <div id="panel-artifacts" class="panel-view active">

  <!-- Controls -->
  <div class="controls">
    <div class="notebook-row">
      <select class="notebook-select" id="notebook-select">
        <option value="" data-i18n="allNotebooks">All Notebooks</option>
      </select>
      <button class="btn primary sm" id="btn-sync" title="Sync with page" data-i18n-title="syncWithPage" data-i18n="sync">Sync</button>
    </div>
    <div class="inputs-row" id="prefab-inputs">
      <input type="text" id="input-topic" placeholder="Topic" data-i18n-placeholder="topicPlaceholder" />
      <input type="text" id="input-audience" placeholder="Audience" data-i18n-placeholder="audiencePlaceholder" />
    </div>
  </div>

  <!-- Filter Chips -->
  <div class="chips" id="chips">
    <button class="chip active" data-filter="all"><span data-i18n="all">All</span> <span class="count" id="count-all">0</span></button>
    <button class="chip" data-filter="audio">&#127909; <span class="count" id="count-audio">0</span></button>
    <button class="chip" data-filter="video">&#127916; <span class="count" id="count-video">0</span></button>
    <button class="chip" data-filter="slide_deck">&#128193; <span class="count" id="count-slide_deck">0</span></button>
    <button class="chip" data-filter="mind_map">&#129504; <span class="count" id="count-mind_map">0</span></button>
    <button class="chip" data-filter="report">&#128202; <span class="count" id="count-report">0</span></button>
  </div>

  <!-- Vault Grid -->
  <div class="vault-container" id="vault">
    <div class="empty-state" id="vault-empty">
      <div class="icon">&#128229;</div>
      <div class="title" data-i18n="noArtifactsYet">No artifacts yet</div>
      <div class="desc" data-i18n="noArtifactsDesc">Open notebooklm.google.com and click Sync, or browse your local vault folder.</div>
    </div>
  </div>

  </div><!-- /panel-artifacts -->

  <div id="panel-sources" class="panel-view">
    <div class="sources-header">
      <button class="btn primary sm" id="btn-extract-sources">Extract All Sources</button>
      <button class="btn ghost sm" id="btn-clear-exports" title="Clear all exports">Clear</button>
    </div>
    <p class="sources-status" id="sources-status"></p>

    <div id="sources-list-view">
      <div class="empty-state" id="sources-empty">
        <div class="icon">&#128218;</div>
        <div class="title">No source exports yet</div>
        <div class="desc">Open a NotebookLM notebook, then click Extract All Sources.</div>
      </div>
      <div class="sources-exports-list" id="sources-exports-list"></div>
    </div>

    <div id="sources-detail-view" class="hidden">
      <div class="sources-detail-bar">
        <button class="btn ghost sm" id="btn-sources-back">&larr; Back</button>
        <button class="btn primary sm" id="btn-download-all-sources">Download All</button>
      </div>
      <h3 class="sources-detail-title" id="sources-detail-title"></h3>
      <label class="sources-option hidden" id="sources-media-option">
        <input type="checkbox" id="chk-include-media" checked />
        Include media files in zip
      </label>
      <div class="sources-items" id="sources-items"></div>
    </div>

    <div id="sources-viewer" class="hidden">
      <div class="sources-detail-bar">
        <button class="btn ghost sm" id="btn-viewer-back">&larr; Back</button>
        <button class="btn primary sm" id="btn-download-source-md">Download .md</button>
      </div>
      <h3 class="sources-detail-title" id="sources-viewer-title"></h3>
      <div class="sources-viewer-content" id="sources-viewer-content"></div>
    </div>
  </div>

  <!-- Inspector Panel -->
  <div class="inspector" id="inspector">
    <div class="inspector-header" id="inspector-toggle">
      <span class="inspector-header-title">&#128203; <span data-i18n="inspector">Inspector</span></span>
      <span style="color:var(--fg3);font-size:10px;">&#9660;</span>
    </div>
    <div class="inspector-body" id="inspector-body"></div>
    <div class="inspector-actions" id="inspector-actions"></div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="modal-settings">
    <div class="modal">
      <div class="modal-header">
        <span data-i18n="settings">Settings</span>
        <button class="btn ghost sm" id="btn-close-settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-label" data-i18n="licenseKey">License Key</div>
          <input class="modal-input" id="setting-license" placeholder="Enter Pro license key" data-i18n-placeholder="enterLicense" />
        </div>
        <div class="modal-row">
          <div class="modal-label" data-i18n="autoSyncOnPage">Auto-sync on page</div>
          <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg2);cursor:pointer;">
            <input type="checkbox" id="setting-autosync" checked style="accent-color:var(--accent);" />
            <span data-i18n="detectNewArtifacts">Detect new artifacts automatically</span>
          </label>
        </div>
        <div class="modal-row">
          <div class="modal-label" data-i18n="vaultFolder">Vault Folder</div>
          <input class="modal-input" id="setting-vaultpath" placeholder="~/Downloads/vault-storage/" data-i18n-placeholder="vaultPathPlaceholder" />
        </div>
        <div class="modal-row" id="members-section" style="display:none;">
          <div class="modal-label" data-i18n="members">Members</div>
          <div id="members-list" class="members-list"></div>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <input class="modal-input" id="member-username" placeholder="Username" data-i18n-placeholder="username" style="flex:1;" />
            <select class="modal-input" id="member-role" style="width:90px;">
              <option value="viewer" data-i18n="viewer">Viewer</option>
              <option value="editor" data-i18n="editor">Editor</option>
              <option value="admin" data-i18n="admin">Admin</option>
            </select>
            <button class="btn primary sm" id="btn-add-member" data-i18n="addMember">Add</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-cancel-settings" data-i18n="cancel">Cancel</button>
        <button class="btn primary" id="btn-save-settings" data-i18n="save">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toasts"></div>
</div>

<script type="module" src="sidepanel.js"></script>
</body>
</html>
