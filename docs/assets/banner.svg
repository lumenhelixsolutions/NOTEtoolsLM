<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <rect x="20" y="20" width="760" height="160" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="10"/>
  
  <!-- Logo icon -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="url(#accent)"/>
    <rect x="18" y="20" width="44" height="6" rx="3" fill="white" opacity="0.9"/>
    <rect x="18" y="34" width="32" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="18" y="48" width="38" height="6" rx="3" fill="white" opacity="0.5"/>
    <circle cx="62" cy="62" r="10" fill="#10b981"/>
    <path d="M58 62 l3 3 l5 -6" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="170" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-0.02em">NOTEtoolsLM</text>
  <text x="172" y="125" font-family="system-ui, -apple-syst em, sans-serif" font-size="18" font-weight="400" fill="#94a3b8">The ultimate open-source orchestration suite for Google NotebookLM</text>
  
  <!-- Version badge -->
  <rect x="172" y="145" width="60" height="24" rx="12" fill="rgba(59,130,246,0.15)"/>
  <text x="202" y="162" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">v2.0.0</text>
</svg>
